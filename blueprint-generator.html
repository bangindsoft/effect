<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blueprint Photo Generator</title>
  <style>
    :root {
      --bg-main: #0b1329;
      --bg-card: #1e293b;
      --accent: #38bdf8;
      --accent-hover: #0284c7;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
    }

    .container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 8px;
    }

    .tool-box {
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      text-align: center;
    }

    .tool-title {
      margin: 0 0 2px 0;
      color: var(--accent);
      font-size: 1.2rem;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      background: var(--bg-card);
      padding: 10px;
      border-radius: 6px;
      text-align: left;
      margin: 8px 0;
    }

    .control-group label {
      font-size: 10px;
      font-weight: bold;
      display: block;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent);
    }

    .control-group input[type="file"],
    .control-group input[type="range"],
    .control-group select {
      width: 100%;
      background: #0f172a;
      color: #fff;
      border: 1px solid var(--border);
      padding: 4px;
      border-radius: 4px;
      font-size: 11px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }

    .canvas-container {
      position: relative;
      overflow: hidden;
      max-height: 320px;
      background: #020617;
      border: 1px dashed var(--border);
      border-radius: 6px;
      padding: 4px;
    }

    canvas {
      max-width: 100%;
      max-height: 310px;
      width: auto;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 4px;
      object-fit: contain;
    }

    .btn-download {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .btn-download:hover {
      background: var(--accent-hover);
      color: #fff;
    }

    .privacy-note {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 6px;
      margin-bottom: 0;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="tool-box">
    <h2 class="tool-title">Instant Blueprint Generator</h2>
    <p style="font-size: 11px; color: var(--text-muted); margin: 0;">Convert your photos into technical architectural blueprints instantly.</p>

    <div class="controls-grid">
      <div class="control-group">
        <label>1. Select Photo</label>
        <input type="file" id="bp-file-input" accept="image/*">
      </div>
      
      <div class="control-group">
        <label>2. Line Detail</label>
        <input type="range" id="bp-threshold" min="10" max="100" value="35">
      </div>

      <div class="control-group">
        <label>3. Background Tint</label>
        <select id="bp-bg-color">
          <option value="#002b49">Classic Blue (#002b49)</option>
          <option value="#001a33">Dark Navy (#001a33)</option>
          <option value="#0d3b66">Royal Blue (#0d3b66)</option>
        </select>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="bp-grid-toggle" checked>
        <label for="bp-grid-toggle" style="margin:0; font-size: 10px;">Show Grid Lines</label>
      </div>
    </div>

    <div class="canvas-container">
      <canvas id="bp-canvas"></canvas>
    </div>

    <button id="bp-download-btn" class="btn-download">Save Result (PNG)</button>
    <p class="privacy-note">🔒 Privacy Protected: All processing happens locally on your device.</p>
  </div>
</div>

<script>
(function() {
  const fileInput = document.getElementById('bp-file-input');
  const thresholdInput = document.getElementById('bp-threshold');
  const bgColorInput = document.getElementById('bp-bg-color');
  const gridToggle = document.getElementById('bp-grid-toggle');
  const canvas = document.getElementById('bp-canvas');
  const ctx = canvas.getContext('2d');
  const downloadBtn = document.getElementById('bp-download-btn');

  let currentImg = null;

  function initPlaceholder() {
    canvas.width = 600;
    canvas.height = 300;
    ctx.fillStyle = bgColorInput.value;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    ctx.fillStyle = '#ffffff';
    ctx.font = '15px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Upload an image to render blueprint effect', canvas.width / 2, canvas.height / 2);
  }

  function drawGrid() {
    if (!gridToggle.checked) return;
    const size = 20;
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
    ctx.lineWidth = 1;
    for (let x = 0; x < canvas.width; x += size) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += size) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }
  }

  function processImage() {
    if (!currentImg) return;

    const maxDim = 1200;
    let w = currentImg.width;
    let h = currentImg.height;
    if (w > maxDim || h > maxDim) {
      if (w > h) { h = Math.round((h * maxDim) / w); w = maxDim; }
      else { w = Math.round((w * maxDim) / h); h = maxDim; }
    }

    canvas.width = w;
    canvas.height = h;

    ctx.drawImage(currentImg, 0, 0, w, h);
    const imgData = ctx.getImageData(0, 0, w, h);
    const data = imgData.data;

    const gray = new Float32Array(w * h);
    for (let i = 0; i < data.length; i += 4) {
      gray[i / 4] = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
    }

    const bgHex = bgColorInput.value;
    const bgR = parseInt(bgHex.slice(1, 3), 16);
    const bgG = parseInt(bgHex.slice(3, 5), 16);
    const bgB = parseInt(bgHex.slice(5, 7), 16);
    const threshold = parseFloat(thresholdInput.value);

    for (let y = 1; y < h - 1; y++) {
      for (let x = 1; x < w - 1; x++) {
        const idx = y * w + x;
        const gx = -gray[idx - w - 1] + gray[idx - w + 1]
                   - 2 * gray[idx - 1] + 2 * gray[idx + 1]
                   - gray[idx + w - 1] + gray[idx + w + 1];

        const gy = -gray[idx - w - 1] - 2 * gray[idx - w] - gray[idx - w + 1]
                   + gray[idx + w - 1] + 2 * gray[idx + w] + gray[idx + w + 1];

        let edge = Math.sqrt(gx * gx + gy * gy);
        edge = edge < threshold ? 0 : Math.min(255, edge * 2);

        const pIdx = idx * 4;
        const factor = edge / 255;

        data[pIdx]     = bgR + (255 - bgR) * factor;
        data[pIdx + 1] = bgG + (255 - bgG) * factor;
        data[pIdx + 2] = bgB + (255 - bgB) * factor;
        data[pIdx + 3] = 255;
      }
    }

    ctx.putImageData(imgData, 0, 0);
    drawGrid();
  }

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => {
        currentImg = img;
        processImage();
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });

  thresholdInput.addEventListener('input', processImage);
  bgColorInput.addEventListener('change', processImage);
  gridToggle.addEventListener('change', processImage);

  downloadBtn.addEventListener('click', () => {
    if (!currentImg) {
      alert('Please upload an image first.');
      return;
    }
    const link = document.createElement('a');
    link.download = 'blueprint-effect.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  initPlaceholder();
})();
</script>

</body>
</html>
